<style>
:root {
  --bg: #F7F5F2;
  --surface: #FFFFFF;
  --surface2: #F0EDE8;
  --border: #E2DDD6;
  --text: #1C1A17;
  --text2: #6B6560;
  --text3: #9C978F;
  --gold: #C9A84C;
  --gold-light: #F0E4C0;
  --gold-dark: #A8893A;
  --dark: #2D2B27;
  --danger: #C0392B;
  --success: #27AE60;
  --info: #2980B9;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --sidebar-w: 240px;
  --transition: all 0.2s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1,h2,h3 { font-family: 'Playfair Display', serif; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── AUTH SCREEN ── */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1C1A17 0%, #2D2B27 50%, #3D3830 100%);
  position: relative;
  overflow: hidden;
}
#auth-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
  top: -100px; right: -100px;
}
#auth-screen::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
  bottom: -50px; left: -50px;
}
.auth-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px;
  padding: 48px 40px;
  width: 380px;
  max-width: 90vw;
  text-align: center;
  backdrop-filter: blur(20px);
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.auth-logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); letter-spacing: -0.5px; margin-bottom: 4px; }
.auth-sub { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-bottom: 36px; letter-spacing: 2px; text-transform: uppercase; }
.auth-tagline { color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-bottom: 32px; line-height: 1.6; }
.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  background: var(--gold);
  color: var(--dark);
  border: none; border-radius: 10px;
  padding: 14px 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem; font-weight: 600;
  cursor: pointer; width: 100%;
  transition: var(--transition);
}
.btn-google:hover { background: var(--gold-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,0.4); }
.btn-google svg { flex-shrink: 0; }
.auth-note { color: rgba(255,255,255,0.3); font-size: 0.75rem; margin-top: 20px; }

/* ── APP LAYOUT ── */
#app { display: none; min-height: 100vh; }
.layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--dark);
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s ease;
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo-name { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.3rem; }
.sidebar-logo-sub { color: rgba(255,255,255,0.3); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-section { margin-bottom: 24px; }
.nav-label { color: rgba(255,255,255,0.25); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; padding: 0 8px; margin-bottom: 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  color: rgba(255,255,255,0.55); font-size: 0.9rem; font-weight: 500;
  cursor: pointer; transition: var(--transition); margin-bottom: 2px;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
.nav-item.active { background: rgba(201,168,76,0.15); color: var(--gold); }
.nav-item .icon { width: 18px; text-align: center; flex-shrink: 0; }
.sidebar-user {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--gold); display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700; color: var(--dark); flex-shrink: 0;
  overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { color: rgba(255,255,255,0.7); font-size: 0.82rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-logout { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; padding: 4px; transition: var(--transition); }
.btn-logout:hover { color: var(--danger); }

/* ── MAIN ── */
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.menu-toggle { display: none; background: none; border: none; cursor: pointer; color: var(--text); padding: 4px; }
.topbar-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.content { flex: 1; padding: 28px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
  cursor: pointer; border: none; transition: var(--transition);
}
.btn-primary { background: var(--gold); color: var(--dark); }
.btn-primary:hover { background: var(--gold-dark); transform: translateY(-1px); }
.btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--surface2); }
.btn-danger { background: #FDEDED; color: var(--danger); border: 1px solid #F5C6C6; }
.btn-danger:hover { background: #FAD5D5; }
.btn-success { background: #EBF8F1; color: var(--success); border: 1px solid #A8DFBE; }
.btn-ghost { background: none; border: none; color: var(--text2); padding: 6px 10px; }
.btn-ghost:hover { color: var(--text); background: var(--surface2); border-radius: var(--radius-sm); }
.btn-sm { padding: 7px 12px; font-size: 0.8rem; }
.btn-icon { padding: 8px; border-radius: 8px; }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
.card-sm { padding: 16px; }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 24px; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  width: 80px; height: 80px; border-radius: 50%;
  top: -20px; right: -20px;
  background: var(--gold-light); opacity: 0.4;
}
.stat-label { color: var(--text2); font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--text); margin: 6px 0 4px; }
.stat-sub { color: var(--text3); font-size: 0.78rem; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; padding: 10px 16px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 600; border-bottom: 1px solid var(--border); }
tbody td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--bg); }

/* ── BADGE ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
.badge-draft { background: #F0EDE8; color: var(--text2); }
.badge-sent { background: #EBF5FB; color: var(--info); }
.badge-accepted { background: #EBF8F1; color: var(--success); }
.badge-rejected { background: #FDEDED; color: var(--danger); }

/* ── FORM ── */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
  background: var(--surface); transition: var(--transition); outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
/* ogni modal successiva sale di z-index */
.modal-overlay:nth-child(2) { z-index: 210; background: rgba(0,0,0,0.35); }
.modal-overlay:nth-child(3) { z-index: 220; background: rgba(0,0,0,0.25); }
.modal {
  background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-lg);
  width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
  transform: scale(0.95); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: scale(1); }
.modal-lg { max-width: 860px; }
.modal-header { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
.modal-body { padding: 24px 28px; }
.modal-footer { padding: 0 28px 24px; display: flex; gap: 10px; justify-content: flex-end; }
.btn-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1.2rem; padding: 4px; line-height: 1; }
.btn-close:hover { color: var(--text); }

/* ── PRODUCT PICKER ── */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; }
.product-pick-card {
  border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px; cursor: pointer; transition: var(--transition);
}
.product-pick-card:hover { border-color: var(--gold); background: var(--gold-light); }
.product-pick-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); }
.product-pick-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
.product-pick-cat { color: var(--text3); font-size: 0.75rem; margin-bottom: 6px; }
.product-pick-price { color: var(--gold-dark); font-weight: 700; font-size: 1rem; }

/* ── QUOTE ITEMS ── */
.quote-item {
  display: grid; align-items: center;
  grid-template-columns: 1fr auto auto auto;
  gap: 12px; padding: 12px 16px;
  background: var(--bg); border-radius: var(--radius-sm);
  margin-bottom: 8px; border: 1px solid var(--border);
}
.quote-item-name { font-weight: 600; font-size: 0.9rem; }
.quote-item-cat { color: var(--text3); font-size: 0.75rem; }
.qty-input { width: 60px; text-align: center; padding: 6px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; }
.item-total { font-weight: 700; color: var(--gold-dark); min-width: 80px; text-align: right; }

/* ── SEARCH ── */
.search-box { position: relative; }
.search-box input { padding-left: 36px; }
.search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

/* ── LOGO UPLOAD ── */
.logo-upload-area {
  border: 2px dashed var(--border); border-radius: var(--radius-sm);
  padding: 20px; text-align: center; cursor: pointer; transition: var(--transition);
}
.logo-upload-area:hover { border-color: var(--gold); background: var(--gold-light); }
.logo-preview { max-height: 80px; margin: 0 auto 8px; display: block; }

/* ── MOBILE ── */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--dark); border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 100; padding: 8px 0 env(safe-area-inset-bottom);
}
.bottom-nav-items { display: flex; justify-content: space-around; }
.bottom-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 12px; background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.4); font-size: 0.68rem; font-family: 'DM Sans', sans-serif;
  transition: var(--transition);
}
.bottom-nav-item.active { color: var(--gold); }
.bottom-nav-item svg { width: 20px; height: 20px; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-state svg { margin: 0 auto 16px; display: block; opacity: 0.4; }
.empty-state h3 { font-family: 'Playfair Display', serif; color: var(--text2); margin-bottom: 8px; }

/* ── TOAST ── */
#toast-container { position: fixed; bottom: 80px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--dark); color: white; padding: 12px 18px; border-radius: 10px;
  font-size: 0.85rem; box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--gold); }
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

/* ── DASHBOARD ── */
.recent-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

/* ── SETTINGS ── */
.settings-section { margin-bottom: 28px; }
.settings-section h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .main { margin-left: 0; padding-bottom: 80px; }
  .topbar { padding: 14px 16px; }
  .content { padding: 16px; }
  .menu-toggle { display: block; }
  .bottom-nav { display: block; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .recent-grid { grid-template-columns: 1fr; }
  .topbar-actions .btn-text { display: none; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .modal { border-radius: 16px 16px 0 0; }
  .modal-overlay { align-items: flex-end; padding: 0; }
}

/* ── PRINT ── */
@media print { body * { display: none; } #print-area { display: block !important; } }
#print-area { display: none; }

/* ── SIDEBAR OVERLAY (mobile) ── */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
.sidebar-overlay.open { display: block; }

.chip { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; background: var(--gold-light); color: var(--gold-dark); font-weight: 600; }
.global-search-results {
  position: absolute; top: 100%; right: 0; width: 360px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-lg);
  z-index: 500; max-height: 400px; overflow-y: auto;
  margin-top: 4px;
}
.gsr-section { padding: 8px 14px 4px; font-size: 0.7rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.gsr-item { padding: 10px 14px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.gsr-item:last-child { border-bottom: none; }
.gsr-item:hover { background: var(--surface2); }
.gsr-icon { font-size: 1rem; flex-shrink: 0; }
.gsr-main { font-weight: 600; font-size: 0.88rem; }
.gsr-sub { color: var(--text3); font-size: 0.75rem; }
#global-search-box { position: relative; }
.stato-select { border: 1px solid transparent; border-radius: 6px; padding: 3px 6px; font-weight: 600; cursor: pointer; transition: var(--transition); outline: none; }
.stato-select:hover { border-color: var(--border); }
.stato-select:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,168,76,0.15); }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.text-right { text-align: right; }
.text-muted { color: var(--text3); }
.fw-bold { font-weight: 700; }
.mt-auto { margin-top: auto; }
.totale-box { background: var(--dark); color: white; border-radius: var(--radius-sm); padding: 16px 20px; }
.totale-row { display: flex; justify-content: space-between; align-items: center; }
.totale-final { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">InfissiPro</div>
    <div class="auth-sub">Gestione Preventivi</div>
    <p class="auth-tagline">Il tuo studio digitale per preventivi professionali su infissi, porte e finestre.</p>
    <button class="btn-google" onclick="signInGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.7 2.3 30.2 0 24 0 14.6 0 6.6 5.5 2.7 13.4l7.9 6.1C12.5 13.1 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.6 28.5c-.5-1.5-.8-3.2-.8-4.8s.3-3.3.8-4.8l-7.9-6.1C.9 15.9 0 19.8 0 24s.9 8.1 2.7 11.3l7.9-5.8z"/><path fill="#34A853" d="M24 48c6.2 0 11.5-2.1 15.4-5.6l-7.5-5.8c-2.1 1.4-4.8 2.2-7.9 2.2-6.2 0-11.5-3.6-13.4-8.8l-7.9 5.8C6.6 42.5 14.6 48 24 48z"/></svg>
      Accedi con Google
    </button>
    <div class="auth-note">Accesso riservato agli utenti autorizzati</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-name">InfissiPro</div>
      <div class="sidebar-logo-sub">Gestione Preventivi</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Menu</div>
        <button class="nav-item active" onclick="navigate('dashboard')" data-page="dashboard">
          <span class="icon">⊞</span> Dashboard
        </button>
        <button class="nav-item" onclick="navigate('preventivi')" data-page="preventivi">
          <span class="icon">📋</span> Preventivi
        </button>
        <button class="nav-item" onclick="navigate('prodotti')" data-page="prodotti">
          <span class="icon">📦</span> Prodotti
        </button>
        <button class="nav-item" onclick="navigate('categorie')" data-page="categorie" style="padding-left:28px;font-size:0.82rem;opacity:0.85">
          <span class="icon">🏷️</span> Categorie & Materiali
        </button>
        <button class="nav-item" onclick="navigate('clienti')" data-page="clienti">
          <span class="icon">👥</span> Clienti
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">Sistema</div>
        <button class="nav-item" onclick="navigate('impostazioni')" data-page="impostazioni">
          <span class="icon">⚙</span> Impostazioni
        </button>
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar"><span id="sidebar-initial">?</span></div>
      <div class="user-name" id="sidebar-name">Caricamento...</div>
      <button class="btn-logout" onclick="signOut()" title="Esci">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title" id="page-title">Dashboard</h1>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="search-box" id="global-search-box" style="display:none">
          <span class="search-icon">🔍</span>
          <input class="form-input" id="global-search-input" placeholder="Cerca ovunque..." 
            oninput="globalSearch(this.value)" 
            style="width:220px;font-size:0.85rem"
            onblur="setTimeout(()=>hideGlobalSearch(),200)">
        </div>
        <button class="btn btn-ghost btn-icon" onclick="toggleGlobalSearch()" title="Ricerca globale" id="global-search-btn" style="color:var(--text2)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>

    <main class="content" id="page-content"></main>
  </div>

  <!-- BOTTOM NAV (mobile) -->
  <nav class="bottom-nav">
    <div class="bottom-nav-items">
      <button class="bottom-nav-item active" onclick="navigate('dashboard')" data-bnav="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Home
      </button>
      <button class="bottom-nav-item" onclick="navigate('preventivi')" data-bnav="preventivi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Preventivi
      </button>
      <button class="bottom-nav-item" onclick="navigate('prodotti')" data-bnav="prodotti">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Prodotti
      </button>
      <button class="bottom-nav-item" onclick="navigate('clienti')" data-bnav="clienti">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clienti
      </button>
    </div>
  </nav>
</div>

<!-- MODALS (dynamic) -->
<div id="modal-container"></div>
<div id="toast-container"></div>

<script src="firebase.js?v=1775846046"></script>
<script src="ui.js?v=1775846046"></script>
<script src="impostazioni.js?v=1775846046"></script>
<script src="prodotti.js?v=1775846046"></script>
<script src="clienti.js?v=1775846046"></script>
<script src="preventivi.js?v=1775846046"></script>
<script src="pdf-email.js?v=1775846046"></script>

</body>
</html>
